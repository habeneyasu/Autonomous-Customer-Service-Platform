<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <title>ACSP Customer Care</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app">
    <header class="nav">
      <div class="nav-brand" aria-label="ACSP Customer Care">
        <span class="logo-mark" aria-hidden="true">A</span>
        <h1><span class="logo-name">ACSP</span> Customer Care</h1>
      </div>
      <div class="nav-actions">
        <span id="health" class="badge" aria-live="polite">Checking…</span>
        <button type="button" class="ghost" id="btn-settings">Settings</button>
        <button type="button" class="ghost" id="btn-new">New session</button>
      </div>
    </header>

    <div class="banner" role="status">
      <strong>Prototype only.</strong>
      Do not enter real account numbers, passwords, or OTPs.
      Demo replies are grounded in secured enterprise tools.
    </div>

    <div class="workspace">
      <main class="stage">
        <div class="conversation" id="conversation" role="log" aria-live="polite" aria-relevant="additions"></div>
      </main>

      <footer class="dock">
        <div class="dock-inner">
          <div class="suggestions" id="suggestions" hidden></div>
          <form class="composer" id="composer">
            <label class="sr-only" for="message">Message</label>
            <textarea
              id="message"
              rows="1"
              placeholder="Ask a question"
              autocomplete="off"
              enterkeyhint="send"
            ></textarea>
            <button type="submit" class="send" id="btn-send" aria-label="Send message" disabled>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 19V5M12 5l-6 6M12 5l6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </form>
          <p class="status" id="status">Ready</p>
        </div>
      </footer>
    </div>
  </div>

  <dialog class="sheet" id="settings">
    <form method="dialog" class="sheet-card">
      <header>
        <h2>Settings</h2>
        <button type="submit" class="icon-close" aria-label="Close">×</button>
      </header>
      <label class="field">
        <span>Response engine</span>
        <select id="mode">
          <option value="Demo replies (offline)">Demo replies (offline)</option>
          <option value="Live AI assistant">Live AI assistant</option>
        </select>
      </label>
      <label class="field">
        <span>Conversation intent</span>
        <select id="intent"></select>
      </label>
      <label class="field">
        <span>Audit trail</span>
        <textarea id="trace" rows="6" readonly></textarea>
      </label>
    </form>
  </dialog>

  <script src="/static/app.js" defer></script>
</body>
</html>
